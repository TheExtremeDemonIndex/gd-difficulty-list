        :root {
            --bg-color: #121214;
            --surface-color: #1a1a1e;
            --text-color: #e2e8f0;
            --accent-color: #3b82f6;
            --active-color: #3b82f6;
            --border-color: #2d2d34;
            --header-bg: #1e1e24;
            --rank-badge-text: #f8fafc;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-color: #0f172a;
            --accent-color: #2563eb;
            --active-color: #2563eb;
            --border-color: #e2e8f0;
            --header-bg: #f1f5f9;
            --rank-badge-text: #0f172a;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            background-color: var(--header-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        input, select, button {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--surface-color);
            color: var(--text-color);
            font-size: 14px;
            cursor: pointer;
        }

        input[type="text"] {
            cursor: text;
            width: 200px;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            height: calc(100vh - 70px);
        }

        .list-section {
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            gap: 15px;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card.active {
            border-color: var(--active-color, var(--accent-color));
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .rank-badge {
            color: var(--rank-badge-text);
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            min-width: 30px;
        }

        .thumb {
            width: 120px;
            height: 68px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #000;
        }

        .info {
            flex-grow: 1;
        }

        .name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .meta {
            font-size: 13px;
            opacity: 0.7;
        }

        .panel-section {
            border-left: 1px solid var(--border-color);
            background-color: var(--surface-color);
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-section img {
            width: 100%;
            border-radius: 8px;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        .desc {
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.9;
        }

        .history-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
        }

        [data-theme="light"] .history-box {
            background: rgba(0, 0, 0, 0.02);
        }

        .history-title {
            font-weight: bold;
            margin-bottom: 6px;
            opacity: 0.8;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .history-list {
            margin: 0;
            padding-left: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .panel-action-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            text-align: center;
            text-decoration: none;
            display: block;
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* Modal styling */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal.show {
            opacity: 1;
        }
        .modal-content {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            font-size: 20px; color: var(--text-color);
        }
        .log-entry {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }
        .log-entry:last-child {
            border: none; margin-bottom: 0; padding-bottom: 0;
        }
        .log-list li {
            margin-bottom: 6px;
            font-size: 14px;
        }
    </style>
</head>

        let selectedLevel = null;

        function toggleChangelog() {
            const modal = document.getElementById("changelog-modal");
            if (modal.classList.contains("show")) {
                modal.classList.remove("show");
                setTimeout(() => modal.style.display = "none", 300);
            } else {
                modal.style.display = "flex";
                void modal.offsetWidth; 
                modal.classList.add("show");
            }
        }

        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute("data-theme");
            body.setAttribute("data-theme", currentTheme === "light" ? "dark" : "light");
        }

        function selectLevel(rank) {
            selectedLevel = levels.find(l => l.r === rank);
            renderPanel();
            renderList();
        }

        function renderPanel() {
            const panel = document.getElementById("panel");
            if (!selectedLevel) {
                panel.innerHTML = '<p style="text-align: center; opacity: 0.5; margin-top: 50px;">Select a demon to preview details</p>';
                return;
            }

            const historyItems = selectedLevel.history.map(item => `<li>${item}</li>`).join("");
            const thumbUrl = selectedLevel.videoId ? `https://img.youtube.com/vi/${selectedLevel.videoId}/hqdefault.jpg` : 'https://via.placeholder.com/400x225/1a1a1e/ffffff?text=No+Preview';

            panel.innerHTML = `
                <img src="${thumbUrl}" alt="${selectedLevel.n}">
                <div>
                    <div style="font-size: 14px; opacity: 0.6; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;">Rank #${selectedLevel.r}</div>
                    <h2 style="margin: 0 0 8px 0; font-size: 26px;">${selectedLevel.n}</h2>
                    <div class="meta" style="font-size: 14px;">
                        Created by <strong>${selectedLevel.c}</strong><br>
                        Verified by <strong>${selectedLevel.v}</strong>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; font-weight: bold; background: rgba(0,0,0,0.15); padding: 10px; border-radius: 6px;">
                    <div>Score: ${selectedLevel.s}</div>
                    ${selectedLevel.daysAtTop1 > 0 ? `<div style="margin-left: auto;">Top 1: ${selectedLevel.daysAtTop1} days</div>` : ''}
                </div>
                <div class="desc">${selectedLevel.d}</div>
                <div class="history-box">
                    <div class="history-title">Rank Placement History</div>
                    <ul class="history-list">${historyItems}</ul>
                </div>
                ${selectedLevel.videoId ? `<a href="https://www.youtube.com/watch?v=${selectedLevel.videoId}" target="_blank" class="panel-action-btn">Watch Verification Video</a>` : ''}
            `;
        }

        function renderList() {
            const list = document.getElementById("list");
            const search = document.getElementById("search").value.toLowerCase();
            const sort = document.getElementById("sort").value;

            let filtered = levels.filter(l => 
                l.n.toLowerCase().includes(search) || 
                l.c.toLowerCase().includes(search) || 
                l.v.toLowerCase().includes(search)
            );

            if (sort === "low-score") {
                filtered.sort((a, b) => a.s - b.s);
            } else if (sort === "alphabetical") {
                filtered.sort((a, b) => a.n.localeCompare(a.n));
            } else if (sort === "site-top1") {
                filtered.sort((a, b) => b.daysAtTop1 - a.daysAtTop1);
            } else {
                filtered.sort((a, b) => a.r - b.r);
            }

            list.innerHTML = filtered.map(l => {
                const activeClass = selectedLevel && selectedLevel.r === l.r ? 'active' : '';
                const thumbUrl = l.videoId ? `https://img.youtube.com/vi/${l.videoId}/mqdefault.jpg` : 'https://via.placeholder.com/120x68/1a1a1e/ffffff?text=No+Image';
                return `
                    <div class="card ${activeClass}" onclick="selectLevel(${l.r})">
                        <div class="rank-badge">#${l.r}</div>
                        <img class="thumb" src="${thumbUrl}" alt="${l.n}">
                        <div class="info">
                            <div class="name">${l.n}</div>
                            <div class="meta">by ${l.c} • Verified by ${l.v}</div>
                        </div>
                        <div style="font-weight: bold; opacity: 0.8; font-size: 14px;">${l.s} pts</div>
                    </div>
                `;
            }).join("");
        }

        function renderChangelog() {
            const container = document.getElementById("changelog-list");
            container.innerHTML = changelogData.map(log => `
                <div class="log-entry">
                    <h3 style="margin: 0 0 8px 0; font-size: 16px;">${log.date}</h3>
                    <ul class="log-list" style="padding-left: 18px; margin: 0;">
                        ${log.changes.map(c => `<li>${c}</li>`).join("")}
                    </ul>
                </div>
            `).join("");
        }

        function render() {
            renderList();
        }

        // Initial setup
        renderChangelog();
        renderList();
    </script>
